version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_key_in_production}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/marketplace.db:/app/marketplace.db
    restart: unless-stopped
    networks:
      - marketplace-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - marketplace-network

networks:
  marketplace-network:
    driver: bridge
